<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoneyManager · 消费日历</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body>
    <header class="top-nav app-shell">
      <div class="top-nav-inner">
        <a class="brand" href="/">
          <span class="brand-dot"></span>
          <span>MoneyManager</span>
        </a>
        <nav class="nav-links">
          <a class="nav-link {{ 'active' if active_page == 'index' else '' }}" href="/">首页</a>
          <a class="nav-link {{ 'active' if active_page == 'analysis' else '' }}" href="/analysis">分析</a>
          <a class="nav-link {{ 'active' if active_page == 'calendar' else '' }}" href="/calendar">日历</a>
          <a class="nav-link {{ 'active' if active_page == 'budget' else '' }}" href="/budget">预算</a>
          <a class="nav-link {{ 'active' if active_page == 'goals' else '' }}" href="/goals">目标</a>
          <a class="nav-link {{ 'active' if active_page == 'subscriptions' else '' }}" href="/subscriptions">订阅</a>
          <a class="nav-link {{ 'active' if active_page == 'ai' else '' }}" href="/ai">AI 复盘</a>
        </nav>
        <div class="nav-actions">
          {% include '_global_month_selector.html' %}
          <button class="btn js-fab-open" type="button">记账</button>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <div class="page">
        <section class="panel">
          <h1 class="page-title">消费日历视图</h1>
          <div class="page-subtitle">当前月份：{{ month }}</div>
          <div class="month-timeline" data-month-timeline data-month="{{ month }}" data-base-path="/calendar"></div>
          <div class="section-insight">每天展示当日总支出，点击日期可查看当日消费明细；颜色越深代表支出越高。</div>
        </section>

        <section class="panel">
          <div class="calendar-week-header">
            <span>周一</span>
            <span>周二</span>
            <span>周三</span>
            <span>周四</span>
            <span>周五</span>
            <span>周六</span>
            <span>周日</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <h2 class="section-title">当日明细</h2>
              <div id="calendar-selected-date" class="section-desc">请选择一个日期查看明细</div>
            </div>
          </div>
          <div class="table-wrap" style="margin-top: 10px;">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>类别</th>
                  <th>标签</th>
                  <th>备注</th>
                  <th>金额</th>
                </tr>
              </thead>
              <tbody id="calendar-day-detail-body">
                <tr>
                  <td colspan="5">请选择一个日期查看明细。</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    {% include '_fab_transaction.html' %}

    <script id="calendar-page-data" type="application/json">{{ {'month': month} | tojson }}</script>
    <script src="{{ url_for('static', filename='js/month-switcher.js') }}"></script>
    <script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/fab.js') }}"></script>
  </body>
</html>
